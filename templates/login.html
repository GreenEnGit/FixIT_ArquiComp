<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FixIT</title>
    <link rel="icon" type="image/png" href="/static/img/logo-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="/static/tailwindcss.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
        @keyframes gradient-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-bg {
            background: linear-gradient(-45deg, #020617, #1e1b4b, #0c4a6e, #0f172a);
            background-size: 400% 400%;
            animation: gradient-bg 15s ease infinite;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-glass {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(96, 165, 250, 0.5);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        .btn-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }
        .btn-glow:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }
        
        /* Floating particles effect */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(96, 165, 250, 0.1);
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body class="animate-bg flex items-center justify-center min-h-screen antialiased text-white overflow-hidden relative">
    
    <!-- Background Particles -->
    <div class="particle w-32 h-32 left-[10%] animation-delay-0"></div>
    <div class="particle w-64 h-64 left-[30%] animation-delay-2000"></div>
    <div class="particle w-24 h-24 left-[60%] animation-delay-4000"></div>
    <div class="particle w-48 h-48 left-[80%] animation-delay-1000"></div>
    
    <!-- Decorative Orbs -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="glass-panel p-8 sm:p-12 rounded-3xl w-full max-w-md relative z-10 transform transition-all hover:scale-[1.01] duration-500">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <img src="/static/img/logo-256x256.png" alt="FixIT Logo" class="h-28 w-auto drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]">
            </div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-300 tracking-tight">Bienvenido a FixIT</h1>
            <p class="text-slate-400 text-sm mt-2 font-light">El sistema operativo de tu taller</p>
        </div>
        
        {% if error %}
        <div class="bg-red-500/10 text-red-400 p-4 rounded-xl text-sm mb-6 border border-red-500/20 flex items-center gap-3 backdrop-blur-sm">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-300 mb-1.5 uppercase tracking-wider">Usuario</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </div>
                    <input type="text" name="username" required class="input-glass w-full pl-11 pr-4 py-3 rounded-xl focus:outline-none text-sm" placeholder="Ej: admin">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-300 mb-1.5 uppercase tracking-wider">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <input type="password" name="password" required class="input-glass w-full pl-11 pr-4 py-3 rounded-xl focus:outline-none text-sm" placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-3.5 px-4 rounded-xl btn-glow mt-4 flex justify-center items-center gap-2 group">
                Iniciar Sesión
                <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>
        
        <div class="mt-8 text-center pt-6 border-t border-white/10">
            <a href="/tracking/REP-001021" class="text-xs text-slate-400 hover:text-blue-400 transition-colors flex items-center justify-center gap-2 group">
                <svg class="w-4 h-4 group-hover:animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                Portal Público de Seguimiento (Demo)
            </a>
        </div>
    </div>
</body>
</html>
