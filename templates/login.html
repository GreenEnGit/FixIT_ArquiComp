<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FixIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen antialiased">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">🔧 FixIT</h1>
            <p class="text-slate-500 text-sm">Ingresa tus credenciales para continuar</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm mb-4 border border-red-200">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Usuario</label>
                <input type="text" name="username" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="admin / tecnico_norte">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="admin123 / tec123">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors shadow-md">
                Iniciar Sesión
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="/tracking/REP-001021" class="text-xs text-slate-500 hover:text-blue-500 underline">Ir al Portal Público de Seguimiento (Demo)</a>
        </div>
    </div>
</body>
</html>
