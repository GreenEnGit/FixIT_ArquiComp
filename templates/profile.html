{% extends "layout.html" %}
{% block content %}
<div class="max-w-2xl mx-auto p-6 bg-white rounded-xl shadow-md">
    <h1 class="text-2xl font-bold mb-4">Editar Perfil</h1>
    <form action="/profile" method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700" for="username">Nombre de usuario</label>
            <input type="text" id="username" name="username" value="{{ user.username }}" required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700" for="current_password">Contraseña actual</label>
            <input type="password" id="current_password" name="current_password" required
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700" for="new_password">Nueva contraseña (opcional)</label>
            <input type="password" id="new_password" name="new_password"
                class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
        </div>
        <div class="flex items-center space-x-4">
            <button type="submit" class="inline-flex items-center justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">Guardar cambios</button>
            <a href="/" class="text-sm text-gray-600 hover:underline">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
